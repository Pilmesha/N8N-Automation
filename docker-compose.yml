services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n-processor  # Giving it a fresh name
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Tbilisi
      - TZ=Asia/Tbilisi
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/home/node/.n8n-files

volumes:
  n8n_data:
    external: true 